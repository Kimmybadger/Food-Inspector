<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TB MED 530 Inspector</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2128;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #f78166;
    --critical: #ff7b72;
    --noncritical: #79c0ff;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --success: #3fb950;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .logo span { color: var(--text-dim); }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    margin-left: auto;
    transition: background 0.3s;
  }
  .status-dot.ready { background: var(--success); box-shadow: 0 0 6px var(--success); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    padding: 20px 16px;
    gap: 16px;
  }

  /* API Key Section */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .api-section label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    display: block;
    margin-bottom: 8px;
  }

  .api-row {
    display: flex;
    gap: 8px;
  }

  .api-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  .api-row input:focus { outline: none; border-color: var(--accent); }

  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.danger { background: var(--critical); }

  /* Photo Upload */
  .upload-zone {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: var(--surface2);
  }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .icon { font-size: 32px; margin-bottom: 8px; }
  .upload-zone p { color: var(--text-dim); font-size: 14px; }
  .upload-zone p strong { color: var(--text); }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 8px;
    margin-top: 12px;
  }

  .preview-item {
    position: relative;
    aspect-ratio: 1;
    border-radius: 6px;
    overflow: hidden;
    background: var(--bg);
  }

  .preview-item img {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .preview-item .remove {
    position: absolute;
    top: 4px; right: 4px;
    background: rgba(0,0,0,0.7);
    border: none;
    color: white;
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Notes */
  .notes-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
  }

  .section-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    resize: vertical;
    min-height: 80px;
  }
  textarea:focus { outline: none; border-color: var(--accent); }
  textarea::placeholder { color: var(--text-dim); }

  /* Action buttons */
  .action-row {
    display: flex;
    gap: 8px;
  }

  .btn-analyze {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-analyze:hover { opacity: 0.85; }
  .btn-analyze:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Loading */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .results-header {
    padding: 12px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .results-header h3 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 5px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    transition: color 0.2s, border-color 0.2s;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--text-dim); }

  .results-body {
    padding: 16px;
    font-size: 14px;
    line-height: 1.7;
    white-space: pre-wrap;
    font-family: 'IBM Plex Sans', sans-serif;
  }

  .violation-block {
    background: var(--bg);
    border-left: 3px solid var(--critical);
    border-radius: 0 6px 6px 0;
    padding: 12px 14px;
    margin: 10px 0;
  }

  .violation-block.non-critical {
    border-left-color: var(--noncritical);
  }

  .violation-tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .critical-tag { color: var(--critical); }
  .noncritical-tag { color: var(--noncritical); }

  .provision-ref {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-top: 4px;
  }

  .error-msg {
    background: rgba(255, 123, 114, 0.1);
    border: 1px solid var(--critical);
    border-radius: 6px;
    padding: 12px 14px;
    color: var(--critical);
    font-size: 14px;
  }

  .hidden { display: none; }

  .char-count {
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>

<header>

<main>

      <input type="password" id="apiKey" placeholder="AIza..." autocomplete="off">

    </div>
  </div>

  <!-- Photo Upload -->
  <div>
    <div class="section-label">Photos (optional)</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="photoInput" accept="image/*" multiple onchange="handleFiles(this.files)">
      <div class="icon">📷</div>
      <p><strong>Tap to add photos</strong><br>or drag & drop</p>
    </div>
    <div class="preview-grid" id="previewGrid"></div>
  </div>

  <!-- Notes -->
  <div class="notes-section">
    <div class="section-label">Inspection Notes</div>
    <textarea id="notes" placeholder="Describe findings briefly. Examples:&#10;- Walk-in cooler temp 50°F&#10;- No soap at handwash sink&#10;- Raw chicken stored above RTE foods&#10;- Hood filters visibly grease-laden" maxlength="2000"></textarea>
    <div class="char-count"><span id="charCount">0</span>/2000</div>
  </div>

  <!-- Analyze Button -->
  <div class="action-row">
    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
      <span id="btnText">⚡ Analyze & Find Provisions</span>
      <div class="spinner hidden" id="spinner"></div>
    </button>
  </div>

  <!-- Results -->
  <div class="results hidden" id="resultsBox">
    <div class="results-header">
      <h3>Analysis Result</h3>
      <button class="copy-btn" onclick="copyResults()">Copy</button>
    </div>
    <div class="results-body" id="resultsBody"></div>
  </div>

</main>

2-201.12 Exclusions and restrictions*
The PIC shall EXCLUDE or RESTRICT a FOOD EMPLOYEE from a FOOD ESTABLISHMENT IAW the

(A) Symptomatic with vomiting or diarrhea. Except when the symptom is from a noninfectious condition,

(1) Symptomatic with vomiting or diarrhea; or
(2) Symptomatic with vomiting or diarrhea and diagnosed with an infection from Norovirus, Shigella spp.,
Salmonella (nontyphoidal), or STEC.
(B) Jaundiced or diagnosed with hepatitis A infection. EXCLUDE a FOOD EMPLOYEE who is–
(1) Jaundiced and the onset of jaundice occurred within the last 7 calendar days, unless the FOOD

diagnosed with Typhoid fever, or reports having Typhoid fever within the past 3 months as specified under
Subparagraph 2-201.11(A)(3).
(D) Diagnosed with an asymptomatic infection from Norovirus. If a FOOD EMPLOYEE is diagnosed with

HIGHLY SUSCEPTIBLE POPULATION.

HIGHLY SUSCEPTIBLE POPULATION.

2-3. Personal cleanliness
2-301 Hands and arms
2-301.11 Clean condition*
(A) FOOD EMPLOYEES shall keep their hands and exposed portions of their arms clean.
(B) Hand sanitizers may supplement hand washing procedures for food employees as specified under
§ 2-301.16, but may not be substituted for the cleaning procedure specified under § 2-301.12.†

2-301.12 Cleaning procedure*
(A) FOOD EMPLOYEES shall clean their hands and exposed portions of their arms, including surrogate
prosthetic devices for hands or arms, for at least 20 seconds, using a cleaning compound in a HANDWASHING
SINK that is equipped as specified under § 5-202.12 and Subpart 6-301.
(B) FOOD EMPLOYEES shall use the following cleaning procedure in the order stated to clean their hands
and exposed portions of their arms, including surrogate prosthetic devices for hands and arms:
(1) Rinse under POTABLE, running warm water;
(2) Apply an amount of cleaning compound recommended by the cleaning compound manufacturer;
(3) Rub together vigorously for at least 10 to 15 seconds while–
(a) Paying particular attention to removing soil from underneath the fingernails during the cleaning
procedure, and
(b) Creating friction on the surfaces of the hands and arms or surrogate prosthetic devices for hands
and arms, the fingertips, under the fingernails, the cuticles, the areas between the fingers, and any exposed areas on
the forearms;
(4) Thoroughly rinse under POTABLE, running warm water; and
(5) Immediately follow the cleaning procedure with thorough drying using a method as specified under
§ 6-301.12.
(C) To avoid recontaminating their hands or surrogate prosthetic devices, FOOD EMPLOYEES should use
disposable paper towels or similar clean barriers when touching surfaces such as manually operated faucet handles
on a HANDWASHING SINK or the handle of a rest room door.
(D) If APPROVED and capable of removing the types of soils encountered in the FOOD operations involved,
an automatic handwashing facility may be used by FOOD EMPLOYEES to clean their hands or surrogate
prosthetic devices.

2-301.13 Special hand wash procedures
Reserved.

2-301.14 When to wash*
FOOD EMPLOYEES shall clean their hands and exposed portions of their arms as specified under § 2-301.12
immediately before engaging in FOOD preparation including working with exposed FOOD, clean EQUIPMENT
and UTENSILS, and unwrapped SINGLE-SERVICE and SINGLE-USE ARTICLES and:
(A) After touching bare human body parts other than clean hands and clean, exposed portions of arms;
(B) After using the toilet room;
(C) After caring for or handling SERVICE ANIMALS or aquatic animals as specified in ¶ 2-403.11(B);
(D) Except when drinking from a closed container as specified in ¶ 2-401.11(B), and after coughing, sneezing,
using a handkerchief or disposable tissue, using tobacco, eating, or drinking;
(E) After handling soiled EQUIPMENT or UTENSILS;
(F) During FOOD preparation, as often as necessary to remove soil and contamination and to prevent crosscontamination when changing tasks;
(G) When switching between working with raw FOOD and working with RTE FOOD;

(I) After handling currency or other methods of payment; and

2-301.15 Where to wash
FOOD EMPLOYEES shall clean their hands in a HANDWASHING SINK or APPROVED automatic handwashing

2-301.16 Hand antiseptics
(A) A hand antiseptic used as a topical application, a hand antiseptic solution used as a hand dip, or a hand
antiseptic soap shall–
(1) Comply with one of the following:
(a) Be an APPROVED drug that is listed in the FDA publication Approved Drug Products with
Therapeutic Equivalence Evaluations as an APPROVED drug based on safety and effectiveness; or
(b) Have active antimicrobial ingredients that are listed in the FDA monograph for over-the-counter
Health-Care Antiseptic Drug Products as an antiseptic hand wash, and
(2) Consist only of components which the intended use of each complies with one of the following:
(a) A threshold of regulation exemption under Title 21, Code of Federal Regulations (CFR), Part
170.39 - Threshold of regulation for substances used in food-contact articles; or
(b) 21 CFR 178 - Indirect Food Additives: Adjuvants, Production Aids, and Sanitizers as regulated
for use as a FOOD ADDITIVE with conditions of safe use, or
(c) A determination of generally recognized as safe (GRAS). Partial listings of substances with
FOOD uses that are GRAS may be found in 21 CFR 182 - Substances Generally Recognized as Safe, 21 CFR 184 Direct Food Substances Affirmed as Generally Recognized as Safe, or 21 CFR 186 - Indirect Food Substances
Affirmed as Generally Recognized as Safe for use in contact with food, and in FDA’s Inventory of GRAS Notices,
or
(d) A prior sanction listed under 21 CFR 181 – Prior Sanctioned food Ingredients, or
(e) A FOOD Contact Notification that is effective, and
(3) Be applied only to hands that are cleaned as specified under § 2-301.12.
(4) Alcohol-based hand sanitizers (hand antiseptics) shall contain a minimum of 60 percent ethyl alcohol
and be used IAW label instructions. †
(B) If a hand antiseptic or a hand antiseptic solution used as a hand dip does not meet the criteria specified
under Subparagraph (A)(2) of this section, its use shall be–
(1) Followed by thorough hand rinsing in clean DRINKING water before hand-contact with FOOD or by
the use of gloves; or
(2) Limited to situations that involve no direct contact with FOOD by the bare hands.
(C) A hand antiseptic solution used as a hand dip shall be maintained clean and at a strength equivalent to at
least 100 milligrams per liter (mg/L) chlorine.

2-302 Fingernails
2-302.11 Maintenance
(A) FOOD EMPLOYEES shall keep their fingernails trimmed, filed, and maintained so the edges and surfaces
are cleanable, are not rough, and do not extend more than ¼ inch above the fingertip.
(B) A FOOD EMPLOYEE shall not wear fingernail polish, artificial fingernails, or fingernail jewelry when
working with exposed FOOD.

2-304 Outer clothing
2-304.11 Clean condition
FOOD EMPLOYEES shall wear clean outer clothing to prevent contamination of FOOD, EQUIPMENT,
UTENSILS, LINENS, and SINGLE-SERVICE and SINGLE-USE ARTICLES.

2-4. Hygienic practices
2-401 Food contamination prevention
2-401.11 Eating, drinking, or using tobacco
(A) Except as specified in ¶¶ (B) and (C) of this section, an EMPLOYEE shall eat, drink, or use any form of
tobacco only in designated areas where the contamination of exposed FOOD; clean EQUIPMENT, UTENSILS, and
LINENS; unwrapped SINGLE-SERVICE and SINGLE-USE ARTICLES; or other items needing protection cannot
result.
(B) A FOOD EMPLOYEE may drink from a closed BEVERAGE container if the container is handled to
prevent contamination of–
(1) The EMPLOYEE’S hands;
(2) The container; and
(3) Exposed FOOD; clean EQUIPMENT, UTENSILS, and LINENS; and unwrapped SINGLE-SERVICE
and SINGLE-USE ARTICLES.
(C) A FOOD EMPLOYEE may taste portions of the FOOD during preparation (e.g., recipe testing) provided
the following steps are followed:†
(1) The EMPLOYEE shall use a clean sanitized utensil or single service disposable utensil to withdraw the
FOOD sample.
(2) The FOOD shall be tasted away from the FOOD and in a manner which does not risk contamination of
the FOOD.
(3) The utensil shall be used only once.

2-401.12 Discharges from the eyes, nose, and mouth
FOOD EMPLOYEES experiencing persistent sneezing, coughing, or a runny nose that causes discharges from the
eyes, nose, or mouth may not work with exposed FOOD; clean EQUIPMENT, UTENSILS, and LINENS; or
unwrapped SINGLE-SERVICE or SINGLE-USE ARTICLES.

2-402 Hair restraints
2-402.11 Effectiveness
(A) Except as provided in ¶ (B) of this section, FOOD EMPLOYEES shall wear hair restraints such as hats,
hair coverings or nets, beard restraints, and clothing that covers body hair, that are designed and worn to effectively
keep their hair and sweat from contacting exposed FOOD; clean EQUIPMENT, UTENSILS, and LINENS; and
unwrapped SINGLE-SERVICE and SINGLE-USE ARTICLES.
(B) This section does not apply to FOOD EMPLOYEES such as FOOD ESTABLISHMENT managers; counter
staff who only serve BEVERAGES and wrapped or PACKAGED FOODS; hostesses; and wait staff if they present a
minimal RISK of contaminating exposed FOOD; clean EQUIPMENT, UTENSILS, and LINENS; and unwrapped
SINGLE-SERVICE and SINGLE-USE ARTICLES.

2-501 General principles
2-501.11 Training requirements†
(A) FOOD EMPLOYEES shall be–
(1) Trained to perform their duties in a safe manner and with the ability to protect themselves and others
from intentional and unintentional food contamination.
(2) Trained in the basic principles of food safety, which includes but is not limited to the CDC’s five
foodborne illness risk factors:
(a) FOOD from unsafe sources;
(b) Inadequate cooking;
(c) Improper holding/time-temperature;
(d) Contaminated equipment/cross contamination protection. Discussion shall include general
sanitation and food allergens; and
(e) Poor personal hygiene. Discussion shall include the impact to public health, communicable
diseases transmitted by FOOD EMPLOYEES, and EMPLOYEE health and hygiene.
(B) Except for FOOD EMPLOYEES who serve in a supervisory role and maintain Food Protection Manager
Certification as specified under § 2-502.11 and employees who do not prepare FOOD as specified in § 2-503.12,
each FOOD EMPLOYEE shall receive a minimum of 4 hours of FOOD safety refresher training annually to
reinforce training subjects identified in Subparagraph (A)(2) of this section.
(C) Refresher training–
(1) Shall be conducted within a 12-month period beginning no earlier than one month following an
EMPLOYEE’S initial training.
(2) May be executed incrementally throughout the year to achieve the 4-hour requirement.
(D) FOOD ESTABLISHMENTS hold primary responsibility for funding and coordinating required training
and certification of FOOD EMPLOYEES.

complete an APPROVED Food Protection Manager Certification process as specified in § 2-102.20 and recertify
IAW the interval prescribed by the certifying organization.
(B) Except as specified in ¶ (D) of this section and ¶ 2-503.11(B), the designated PIC at a FOOD
ESTABLISHMENT that only prepares and serves non-TCS FOODS shall complete the initial and annual food
safety refresher training as specified in § 2-501.11.

4-4. Location and installation
4-401 Location
4-401.10 General installation†
Food EQUIPMENT is installed using guidance provided in NSF International’s Installation Manual for Food
Service Equipment, or the FDA Food Establishment Plan Review Guide 2000, and the requirements specified in Part
4-4 of this publication.

4-401.11 Equipment, clothes washers and dryers, and storage cabinets, contamination

(A) Except as specified in ¶ (B) of this section, EQUIPMENT, a cabinet used for the storage of FOOD, or a

(1) In locker rooms;
(2) In toilet rooms;
(3) In garbage rooms;
(4) In mechanical rooms;
(5) Under sewer lines that are not shielded to intercept potential drips;
(6) Under leaking water lines, including leaking automatic fire sprinkler heads, or under lines on which

(7) Under open stairwells; or
(8) Under other sources of contamination.

locker room.
(C) If a mechanical clothes washer or dryer is provided, it shall be located so that the washer or dryer is

LINENS; and no unwrapped SINGLE-SERVICE and SINGLE-USE ARTICLES.

present a RISK for ice contamination.

CHAPTER 6

6-1. Materials for construction and repair
6-101 Indoor areas
6-101.11 Surface characteristics
(A) Except as specified in ¶¶ (B), (C) and (D) of this section, materials for indoor floor, wall, and ceiling
surfaces under conditions of normal use shall be–
(1) SMOOTH, durable, and EASILY CLEANABLE for areas where FOOD ESTABLISHMENT
operations are conducted;
(2) Closely woven and EASILY CLEANABLE carpet for carpeted areas; and
(3) Nonabsorbent for areas subject to moisture such as FOOD preparation areas, walk-in refrigerators,
WAREWASHING areas, toilet rooms, MOBILE FOOD ESTABLISHMENT SERVICING AREAS, and areas
subject to flushing or spray cleaning methods. For new construction or renovation, gypsum wallboard or similar
pervious material may not be used in FOOD preparation, serving, SELF-SERVICING AREAS; WAREWASHING
and pot and pan washing areas; toilet areas; or other areas subject to water damage or high humidity.
(B) In a TEMPORARY FOOD ESTABLISHMENT:
(1) If graded to drain, a floor may be concrete, machine-laid asphalt, or dirt or gravel if it is covered with
mats, removable platforms, duckboards, or other APPROVED materials that are effectively treated to control dust
and mud; and
(2) Walls and ceilings may be constructed of a material that protects the interior from the weather,
windblown dust, and debris.
(C) Acoustical material used in areas exposed to grease or high humidity should be constructed and installed
to provide a reasonably nonabsorbent, EASILY CLEANABLE surface. These materials require periodic
replacement to maintain sanitary standards.†
(D) Water/mold-resistant gypsum wallboard protected by a cement backerboard or green board and ceramic
tile may be used to sheath stud walls.†
(E) Binding cement, mortar, or grout (epoxy) jointed materials used for walls and ceilings (including doors,
windows, skylights, and similar closures) shall be waterproof, grease proof, and erosion resistant. †

6-102 Outdoor areas
6-102.11 Surface characteristics
(A) The outdoor walking and driving areas shall be surfaced with concrete, asphalt, or gravel or other materials
that have been effectively treated to minimize dust, facilitate maintenance, prevent muddy conditions, and pooling
of water.
(B) Exterior surfaces of buildings and MOBILE FOOD ESTABLISHMENTS shall be of weather-resistant
materials and shall comply with LAW.
(C) Outdoor storage areas for REFUSE, recyclables, or returnables shall be of materials specified under
§§ 5-501.11 and 5-501.12.

6-200.11 Food operations, fixed facilities†

(A) Utility service lines and pipes may not be unnecessarily exposed.

(A) In FOOD ESTABLISHMENTS in which cleaning methods other than water flushing are used for cleaning

(1) Securely attached to the floor with a durable mastic, by using a stretch and tack method, or by another

(2) Installed tightly against the wall under the coving or installed away from the wall with a space between

(3) Maintained in good repair.†

6-202.13 Insect control devices, design and installation
(A) Insect control devices that are used to electrocute or stun flying insects shall be designed to retain the insect
within the device.
(B) Insect control devices shall be installed so that:
(1) The devices are not located over a FOOD preparation area; and
(2) Dead insects and insect fragments are prevented from being impelled onto or falling on exposed

ARTICLES.
(3) They are wall-mounted type only. The REGULATORY AUTHORITY may waive this requirement if the
facility demonstrates a need.†
(4) The center of the device is not more than 3 feet (90 cm) above the floor and no closer than 5 feet (150
cm) from exposed FOODS, FOOD-contact surfaces, or clean EQUIPMENT and UTENSILS.†
(5) They are accepted, certified, listed, labeled, or otherwise determined to be safe by a nationally
recognized testing laboratory acceptable to the REGULATORY AUTHORITY and the Armed Forces Pest
Management Board.†

6-202.14 Toilet rooms, enclosed
Except where a toilet room is located outside a FOOD ESTABLISHMENT and does not open directly into the
FOOD ESTABLISHMENT, such as a toilet room that is provided by the management of a shopping mall, a toilet
room located on the PREMISES shall be completely enclosed and provided with a tight-fitting and self-closing door.

6-202.15 Outer openings, protected
(A) Except as specified in ¶¶ (B), (C), and (E) and under ¶ (D) of this section, outer openings of a FOOD
ESTABLISHMENT shall be protected against the entry of insects and rodents by—
(1) Filling or closing holes and other gaps along floors, walls, ceilings
(2) Closed, tight-fitting windows; and
(3) Solid, self-closing, outward-opening, tight-fitting doors.
(B) Paragraph (A) of this section does not apply if a FOOD ESTABLISHMENT opens into a larger structure,

(3) Limited-use so they are not used for entrance or exit from the building for purposes other than the

ESTABLISHMENT, or of a larger structure within which a FOOD ESTABLISHMENT is located, are kept open for

// Key management
function saveKey() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) return;
  localStorage.setItem('gemini_key', key);
  document.getElementById('clearBtn').style.display = '';
  document.getElementById('statusDot').className = 'status-dot ready';
  alert('API key saved.');
}

function clearKey() {
  localStorage.removeItem('gemini_key');
  document.getElementById('apiKey').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  document.getElementById('statusDot').className = 'status-dot';
}

window.onload = () => {
  const saved = localStorage.getItem('gemini_key');
  if (saved) {
    document.getElementById('apiKey').value = saved;
    document.getElementById('clearBtn').style.display = '';
    document.getElementById('statusDot').className = 'status-dot ready';
  }
  document.getElementById('notes').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length;
  });
};

// Photo handling
let photos = [];

function handleFiles(files) {
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      photos.push({ name: file.name, data: e.target.result });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  }
}

function renderPreviews() {
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';
  photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'preview-item';
    div.innerHTML = `<img src="${p.data}"><button class="remove" onclick="removePhoto(${i})">×</button>`;
    grid.appendChild(div);
  });
}

function removePhoto(i) {
  photos.splice(i, 1);
  renderPreviews();
}

// Drag and drop
const zone = document.getElementById('uploadZone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('dragover'); });
zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
zone.addEventListener('drop', e => {
  e.preventDefault();
  zone.classList.remove('dragover');
  handleFiles(e.dataTransfer.files);
});

// Main analysis
async function analyze() {
  const apiKey = localStorage.getItem('gemini_key') || document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Please enter your Gemini API key first.'); return; }

  const notes = document.getElementById('notes').value.trim();
  if (!notes && photos.length === 0) {
    alert('Please add photos and/or inspection notes.');
    return;
  }

  setLoading(true);

  try {
    const systemPrompt = `You are a US Army Environmental Health Inspector using TB MED 530/NAVMED P-5010-1/AFMAN 48-147 IP (Tri-Service Food Code).

The full regulation text (Chapters 2–7) is provided below for your reference:

---
${TBMED_TEXT}
---

Your job:
1. Review the inspector's notes and/or photos
2. Identify all violations (Critical and Non-Critical)
3. For each violation, cite the exact TB MED 530 provision number(s)
4. Provide a structured report

Output format (use exactly this structure):

## INSPECTION FINDINGS

### SUMMARY
[1-2 sentence overall assessment]

### VIOLATIONS FOUND

**[CRITICAL / NON-CRITICAL]** — [Short violation title]
Provision: [e.g., 3-501.16(A)(2)*]
Finding: [What was observed]
Requirement: [What the regulation requires]
---

[Repeat for each violation]

### RECOMMENDED ACTIONS
[Numbered list of corrective actions, most urgent first]

### INSPECTION ITEM MAPPING (DD Form 2973)
[List which checklist item numbers (1-51) are implicated]

Be precise. Only cite provisions that directly apply. If photos show no violations, state that clearly.`;

    // Build message content
    const content = [];

    // Add photos if any
    for (const photo of photos) {
      const base64 = photo.data.split(',')[1];
      const mimeType = photo.data.split(';')[0].split(':')[1];
      content.push({
        inlineData: { mimeType, data: base64 }
      });
    }

    // Add text
    content.push({
      text: notes || "Please analyze the provided photos for any food safety violations."
    });

    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system_instruction: { parts: [{ text: systemPrompt }] },
          contents: [{ role: 'user', parts: content }],
          generationConfig: { temperature: 0.2, maxOutputTokens: 2048 }
        })
      }
    );

    const data = await response.json();

    if (data.error) throw new Error(data.error.message);

    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if (!text) throw new Error('No response from API');

    showResults(text);

  } catch (err) {
    showError(err.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('analyzeBtn').disabled = on;
  document.getElementById('btnText').classList.toggle('hidden', on);
  document.getElementById('spinner').classList.toggle('hidden', !on);
}

function showResults(text) {
  const box = document.getElementById('resultsBox');
  const body = document.getElementById('resultsBody');
  box.classList.remove('hidden');
  body.textContent = text;
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showError(msg) {
  const box = document.getElementById('resultsBox');
  const body = document.getElementById('resultsBody');
  box.classList.remove('hidden');
  body.innerHTML = `<div class="error-msg">⚠️ Error: ${msg}</div>`;
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copyResults() {
  const text = document.getElementById('resultsBody').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}
